# docker-compose.yaml — Local development Airflow stack.
#
# Mirrors the SPCS production architecture in a lightweight local form:
# Postgres (metadata DB) + Airflow webserver + scheduler.
#
# DAGs are bind-mounted from ./dags — edit locally, see changes instantly.
#
# Usage:
#   cp .env.example .env   # fill in Snowflake credentials for SF-connected DAGs
#   docker compose up -d
#   open http://localhost:8080   # admin / admin
#
# To rebuild after Dockerfile or pyproject.toml changes:
#   docker compose build --no-cache
#   docker compose up -d

x-airflow-common: &airflow-common
  build:
    context: ./images/airflow
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: "local-dev-fernet-key-not-for-production-use-0123456="
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: "local-dev-secret-key"
    AIRFLOW__API__SECRET_KEY: "local-dev-secret-key"
    AIRFLOW__API_AUTH__JWT_SECRET: "local-dev-jwt-secret-not-for-production"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution/"
    # Snowflake connection for local dev (optional — only needed for SF DAGs)
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-AIRFLOW_DB}
    SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-AIRFLOW_SCHEMA}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-AIRFLOW_SETUP_WH}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
  volumes:
    - ./dags:/opt/airflow/dags
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    build:
      context: ./images/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        echo '{"admin": "admin"}' > /opt/airflow/simple_auth_manager_passwords.json.generated
        echo "Airflow init complete."
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo '{"admin": "admin"}' > /opt/airflow/simple_auth_manager_passwords.json.generated
        exec airflow api-server --port 8080
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - exec airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - exec airflow dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
